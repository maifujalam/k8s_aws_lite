---
- hosts: k8s-master
  become: false
  vars:
    PROJECT_PATH: k8s_aws_lite  # File will be  created at home directory
    KUBERNETES_MAJOR_VERSION: v1.36
    KUBERNETES_VERSION: 1.36.2  # add 'v' in at prefix whenever required.
    USER: ubuntu
    MASTER_NODE_IP: 172.31.64.40
    WORKER_NODE_IP: 172.31.64.41
  roles:
    - download-packages
    - configure_node
    - bootstrap_k8s_master
