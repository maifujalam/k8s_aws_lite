- name: Copy worker-2 join templates
  template:
    src: join-default-worker-2.yaml.j2
    dest: /home/{{USER}}/{{KUBERNETES_VERSION}}/{{PACKAGE_DIRECTORY}}/join-default-worker-2.yaml

- name: Reset worker-2 kubernetes
  become: true
  shell: kubeadm reset --force

- name: Delete all exited containers.
  become: true
  shell: crictl rm  -all

- name: Remove old kubeconfig files.
  become: true
  shell: rm /etc/kubernetes/* -rfv

- name: Join cluster
  become: true
  shell:  kubeadm join --config /home/{{USER}}/{{KUBERNETES_VERSION}}/{{PACKAGE_DIRECTORY}}/join-default-worker-2.yaml

